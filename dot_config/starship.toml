format = '\[[$symbol($version)]($style)\]'

[daml]
format = '\[[$symbol($version)]($style)\]'

[dart]
symbol = " "
format = '\[[$symbol($version)]($style)\]'

[deno]
symbol = " "
format = '\[[$symbol($version)]($style)\]'

[directory]
read_only = " 󰌾"
format = '[$path ]($style)'
truncation_length = 3
truncation_symbol = "…/"
truncate_to_repo = false

[docker_context]
symbol = " "
format = '\[[$symbol$context]($style)\]'

[dotnet]
